name: "matmul_cpp"
workspace: "tasks/matmul/cpp"
program_type: "cpp"
# target_hardware: "NVIDIA H100"  # optional: tells the agent what to optimize for
target_hardware: null

build:
  cmd: "g++ -O2 -o matmul_bin matmul.cpp"
  expected_exit: 0

correctness:
  cmd: "python tests.py"
  expected_exit: 0

benchmark:
  cmd: "python bench.py --json out/bench.json"
  metric:
    name: "tflops.median"
    mode: "maximize"
  warmup: 2
  repeats: 5

profile_plan:
  always: ["cpu_flame"]

constraints:
  max_iters: 12
  regression_tolerance: 0.02
  rlimit_as_gb: 4

analysis_thresholds:
  perf_ipc_low: 1.5              # tight matmul loop should have high IPC
  perf_cache_miss_rate_high: 0.02 # cache optimization is the whole point
  perf_hotspot_dominance_pct: 40.0 # single kernel should dominate
  perf_cpus_utilized_low: 0.8    # single-threaded task — don't flag 1 CPU

contract:
  fixed_params: { M: 512, N: 512, K: 512 }
  min_repeats: 3
  required_bench_fields: ["ok", "tflops"]

edit_policy:
  allowed_paths:
    - "matmul.cpp"

out_dir: "../../out"
