name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]" ruff mypy pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy perflab

      - name: Test
        run: pytest -q

  # End-to-end smoke on a real task: exercises the correctness runner,
  # benchmark harness, contract validation, and regression check through the
  # actual CLI — the unit suite mocks all of this.
  real-task:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tasks-python]"

      - name: Save baseline (correctness + benchmark + contract)
        run: perflab ci-check tasks/matmul/python/task.yaml --save-baseline

      # --tolerance 0.5: this job exercises the pipeline end-to-end; it is not
      # a perf gate. Pure-Python timing on shared runners can drift well past
      # the task's locally-tuned 2% tolerance between back-to-back runs.
      - name: Regression check against fresh baseline
        run: perflab ci-check tasks/matmul/python/task.yaml --tolerance 0.5
