# DataLoader knobs — deliberately suboptimal defaults.
# Fix: num_workers=4+, pin_memory=true, prefetch_factor=2, larger batch_size
# batch_size is fixed by contract in task.yaml.
num_workers: 0
pin_memory: false
prefetch_factor: 2
batch_size: 32

# Grid search space for `perflab optimize` (24 combinations)
sweep:
  num_workers: [0, 2, 4, 8]
  pin_memory: [false, true]
  prefetch_factor: [1, 2, 4]
