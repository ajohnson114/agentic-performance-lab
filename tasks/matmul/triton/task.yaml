name: "matmul_triton"
workspace: "tasks/matmul/triton"
program_type: "triton"
target_hardware: null  # set to "NVIDIA H100" for CUTLASS baseline hints

build: null

correctness:
  cmd: "python tests.py"
  expected_exit: 0

benchmark:
  cmd: "python bench.py --json out/bench.json"
  metric:
    name: "tflops.median"
    mode: "maximize"
  warmup: 3
  repeats: 20

profile_plan:
  always: ["cpu_flame"]

constraints:
  max_iters: 12
  regression_tolerance: 0.02

analysis_thresholds:
  gpu_cpu_ratio_low: 0.9         # pure GEMM at 4096³ — GPU must dominate
  ncu_sm_util_low: 70.0          # should saturate SMs
  ncu_compute_low: 60.0          # high compute expected
  ncu_occupancy_low: 50.0
  ncu_tc_util_low: 30.0          # Triton tl.dot should use Tensor Cores
  sync_count_warn: 2

contract:
  fixed_params: { M: 4096, N: 4096, K: 4096 }
  min_repeats: 5
  required_bench_fields: ["ok", "tflops"]

data_hints:
  sparsity: 0.0
  dtype_safety: "fp16_safe"
  access_pattern: "blocked"
  value_range: [-0.5, 0.5]

edit_policy:
  allowed_paths:
    - "matmul_kernel.py"
    - "tuning.yaml"

out_dir: "../../out"
