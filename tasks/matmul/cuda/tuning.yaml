# Numeric knobs for `perflab optimize` (grid search) and `perflab agent`.
# Problem dimensions (M, N, K) are fixed by contract in task.yaml.
M: 1024
N: 1024
K: 1024

# threadsPerBlock: threads per block dimension (block is threadsPerBlock × threadsPerBlock).
# Grid is always computed: ceil(M/threadsPerBlock) × ceil(N/threadsPerBlock).
threadsPerBlock: 16

# Grid search space for `perflab optimize --max-trials`.
# Valid 2D block dims only: threadsPerBlock² must not exceed 1024 (hardware limit).
sweep:
  threadsPerBlock: [8, 16, 32]
